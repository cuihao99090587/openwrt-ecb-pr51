name: Build OpenWrt for Lenovo ECB-PR51

on:
  workflow_dispatch:
    inputs:
      branch:
        default: 'main'
        description: 'OpenWrt branch'
        required: true
        type: choice
        options:
          - main
          - openwrt-24.10
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt.git
  OPENWRT_BRANCH: ${{ inputs.branch || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: builder

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-setuptools python3-pip python3-yaml rsync swig \
            unzip zlib1g-dev file wget uuid-dev libgnutls28-dev libjson-c-dev \
            libzstd-dev device-tree-compiler parted dosfstools
          pip3 install pyelftools 2>/dev/null || true
          sudo apt-get clean

      - name: Checkout OpenWrt source
        run: |
          git clone --depth 1 -b ${{ env.OPENWRT_BRANCH }} \
            ${{ env.OPENWRT_REPO }} openwrt

      - name: Apply ECB-PR51 DTS patch
        run: |
          PATCH_DIR=$(ls -d openwrt/target/linux/rockchip/patches-* | tail -1)
          cp builder/patches/100-arm64-dts-rockchip-add-lenovo-ecb-pr51.patch "$PATCH_DIR/"
          cp builder/patches/101-arm64-dts-rockchip-add-ecb-pr51-makefile.patch "$PATCH_DIR/"

      - name: Add device to image config
        run: |
          python3 builder/scripts/add-image-config.py \
            openwrt/target/linux/rockchip/image/armv8.mk

      - name: Configure build
        run: |
          cd openwrt
          cat > .config << 'CONFIGEOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_lenovo_ecb-pr51=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-ipt-offload=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y
          CONFIG_PACKAGE_kmod-ata-ahci=y
          CONFIG_PACKAGE_kmod-pcie-rockchip=y
          CONFIG_PACKAGE_kmod-sdhci=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-rtl8152=y
          CONFIG_PACKAGE_kmod-usb-net-asix=y
          CONFIG_PACKAGE_kmod-usb-net-asix-ax88179=y
          CONFIG_PACKAGE_kmod-sched-cake=y
          CONFIG_PACKAGE_sqm-scripts=y
          CONFIG_PACKAGE_blockd=y
          CONFIG_PACKAGE_blkdiscard=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_u-boot-rock-3a-rk3568=y
          CONFIG_PACKAGE_trusted-firmware-a-rk3568=y
          CONFIG_PACKAGE_rkbin=y
          CONFIGEOF
          make defconfig 2>&1 | tail -5

      - name: Download sources
        run: |
          cd openwrt && make download 2>&1 | tail -5

      - name: Build tools + toolchain
        run: |
          cd openwrt
          make -j$(nproc) tools/install 2>&1 | tail -5
          make -j$(nproc) toolchain/install 2>&1 | tail -5

      - name: Build firmware
        run: |
          cd openwrt && make -j$(nproc) 2>&1 | tail -20

      - name: Package for rkdeveloptool (line flash)
        run: |
          cd openwrt
          mkdir -p flash-pkg
          OUTDIR=bin/targets/rockchip/armv8
          IMG=$(ls $OUTDIR/*-sysupgrade.img.gz 2>/dev/null | head -1)
          if [ -z "$IMG" ]; then
            echo "No image found, looking in subdirs..."
            IMG=$(find bin/targets/ -name '*sysupgrade.img.gz' | head -1)
          fi
          echo "Source image: $IMG"
          [ -z "$IMG" ] && exit 1
          gunzip -kf "$IMG"
          RAW_IMG="${IMG%.gz}"
          echo "Raw image: $RAW_IMG"
          ls -lh "$RAW_IMG"

          # Set up loop device
          sudo modprobe loop
          LOOP=$(sudo losetup -f --show "$RAW_IMG")
          echo "Loop device: $LOOP"
          sudo partprobe $LOOP
          ls -la /dev/${LOOP##/dev/}*

          # Dump partition info
          sudo fdisk -l $LOOP > flash-pkg/partition-table.txt
          cat flash-pkg/partition-table.txt

          # Extract idbloader (first 8MB includes u-boot SPL + DDR init)
          # For rkdeveloptool: idbloader at 0x40 (sector 64 = 32KB)
          sudo dd if=$LOOP of=flash-pkg/idbloader.img bs=512 count=16384 2>/dev/null
          # Extract u-boot.itb (from 8MiB offset = sector 16384)
          sudo dd if=$LOOP of=flash-pkg/uboot.img bs=512 skip=16384 count=16384 2>/dev/null

          # Extract boot partition (starts after 32MB padding)
          # Get actual partition start from fdisk
          START_BOOT=$(sudo fdisk -l $LOOP | grep "${LOOP##*/}p1" | awk '{print $2}')
          START_ROOTFS=$(sudo fdisk -l $LOOP | grep "${LOOP##*/}p2" | awk '{print $2}')
          echo "Boot partition starts at sector: $START_BOOT"
          echo "Rootfs partition starts at sector: $START_ROOTFS"
          
          if [ -n "$START_BOOT" ]; then
            sudo dd if=$LOOP of=flash-pkg/boot.img bs=512 skip=$START_BOOT count=$((START_ROOTFS - START_BOOT)) 2>/dev/null
          fi
          if [ -n "$START_ROOTFS" ]; then
            # Rootfs size = total image size - rootfs start
            TOTAL_SECTORS=$(sudo fdisk -l $LOOP | grep "Disk ${LOOP}" | awk '{print $7}')
            # Use actual partition size from fdisk
            ROOTFS_SIZE=$(sudo fdisk -l $LOOP | grep "${LOOP##*/}p2" | awk '{print $4}')
            sudo dd if=$LOOP of=flash-pkg/rootfs.img bs=512 skip=$START_ROOTFS count=$ROOTFS_SIZE 2>/dev/null
          fi

          # Also create the complete raw image (for dd method)
          cp "$RAW_IMG" flash-pkg/openwrt-ecb-pr51-raw.img

          # Clean up
          sudo losetup -d $LOOP

          # Show results
          echo ""
          echo "=== Flash package contents ==="
          ls -lh flash-pkg/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ecb-pr51
          path: openwrt/flash-pkg/
          retention-days: 30
          if-no-files-found: warn

      - name: Also upload full image as backup
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ecb-pr51-full-img
          path: |
            openwrt/bin/targets/rockchip/armv8/*.gz
            openwrt/bin/targets/rockchip/armv8/*.img
          retention-days: 30
          if-no-files-found: warn

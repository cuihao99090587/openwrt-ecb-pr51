name: Build OpenWrt for Lenovo ECB-PR51

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'OpenWrt branch'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - openwrt-24.10
  push:
    branches: [ main ]
    paths:
      - 'dts/**'
      - 'patches/**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt.git
  OPENWRT_BRANCH: ${{ inputs.branch || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: builder

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-setuptools python3-pip python3-yaml rsync swig \
            unzip zlib1g-dev file wget uuid-dev libgnutls28-dev libjson-c-dev \
            libzstd-dev device-tree-compiler python3-pyelftools
          sudo apt-get clean

      - name: Checkout OpenWrt source
        run: |
          git clone --depth 1 -b ${{ env.OPENWRT_BRANCH }} \
            ${{ env.OPENWRT_REPO }} openwrt
          echo "Kernel patches dir:"
          ls -d openwrt/target/linux/rockchip/patches-* 2>/dev/null

      - name: Apply ECB-PR51 DTS as kernel patch
        run: |
          PATCH_DIR=$(ls -d openwrt/target/linux/rockchip/patches-* 2>/dev/null | tail -1)
          if [ -z "$PATCH_DIR" ]; then exit 1; fi
          echo "Using patches dir: $PATCH_DIR"
          cp builder/patches/100-arm64-dts-rockchip-add-lenovo-ecb-pr51.patch "$PATCH_DIR/"
          cp builder/patches/101-arm64-dts-rockchip-add-ecb-pr51-makefile.patch "$PATCH_DIR/"
          echo "Patches:"
          ls "$PATCH_DIR/" | grep ecb

      - name: Add ECB-PR51 to image config
        run: |
          IMAGE_MK=openwrt/target/linux/rockchip/image/armv8.mk
          if grep -q "lenovo_ecb-pr51" "$IMAGE_MK"; then
            echo "Already present"
          else
            # Insert the device definition AFTER the rk3568 endef block
            python3 << 'PYEOF'
import re

with open("openwrt/target/linux/rockchip/image/armv8.mk") as f:
    content = f.read()

# Find the end of the rk3568 block and insert after it
insert = """
define Device/lenovo_ecb-pr51
  $(Device/rk3568)
  DEVICE_VENDOR := Lenovo
  DEVICE_MODEL := ECB-PR51
  DEVICE_DTS := rk3568-ecb-pr51
  UBOOT_DEVICE_NAME := rock-3a-rk3568
  DEVICE_PACKAGES := kmod-r8169 blkdiscard
endef
TARGET_DEVICES += lenovo_ecb-pr51
"""

# Find first endef after "Device/rk3568" definition
lines = content.split('\n')
new_lines = []
inserted = False
for i, line in enumerate(lines):
    new_lines.append(line)
    if not inserted and line.strip() == 'endef' and i > 0:
        # Check if this endef closes the rk3568 block
        for j in range(i-1, max(0, i-5), -1):
            if 'Device/rk3568' in lines[j]:
                new_lines.append('')
                new_lines.append(insert.strip())
                inserted = True
                break

content = '\n'.join(new_lines)
with open("openwrt/target/linux/rockchip/image/armv8.mk", "w") as f:
    f.write(content)
PYEOF
          fi
          echo "=== Image config result ==="
          grep -A 10 "lenovo\|ecb-pr51" "$IMAGE_MK" || echo "NOT FOUND"

      - name: Configure build
        run: |
          cd openwrt
          cat > .config << 'CONFIGEOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_lenovo_ecb-pr51=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=512

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_LUCI_LANG_zh_Hans=y

          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-ipt-offload=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_ip-full=y

          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y
          CONFIG_PACKAGE_kmod-ata-ahci=y
          CONFIG_PACKAGE_kmod-pcie-rockchip=y
          CONFIG_PACKAGE_kmod-sdhci=y

          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-rtl8152=y
          CONFIG_PACKAGE_kmod-usb-net-asix=y
          CONFIG_PACKAGE_kmod-usb-net-asix-ax88179=y

          CONFIG_PACKAGE_kmod-sched-cake=y
          CONFIG_PACKAGE_sqm-scripts=y

          CONFIG_PACKAGE_blockd=y
          CONFIG_PACKAGE_blkdiscard=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_iperf3=y

          CONFIG_PACKAGE_u-boot-rock-3a-rk3568=y
          CONFIG_PACKAGE_trusted-firmware-a-rk3568=y
          CONFIG_PACKAGE_rkbin=y
          CONFIGEOF

          make defconfig 2>&1 | tail -10
          # Also need to set the Python elftools prereq manually
          pip3 install pyelftools 2>/dev/null || true

      - name: Download sources
        run: |
          cd openwrt && pip3 install pyelftools 2>/dev/null; make download 2>&1 | tail -10

      - name: Build tools + toolchain
        run: |
          cd openwrt
          make -j$(nproc) tools/install 2>&1 | tail -10
          make -j$(nproc) toolchain/install 2>&1 | tail -10

      - name: Build firmware
        id: build
        run: |
          cd openwrt
          make -j$(nproc) 2>&1 | tee build.log | tail -50
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: List artifacts
        if: always()
        run: |
          cd openwrt
          echo "=== Built firmware ==="
          find bin/targets/ -type f -name '*.img*' -o -name '*.bin' -o -name '*.gz' 2>/dev/null | sort
          echo ""
          echo "=== Size ==="
          find bin/targets/ -type f -exec ls -lh {} \; 2>/dev/null

      - name: Upload firmware
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ecb-pr51-${{ env.OPENWRT_BRANCH }}
          path: openwrt/bin/targets/rockchip/
          retention-days: 30
          if-no-files-found: warn

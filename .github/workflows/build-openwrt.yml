name: Build OpenWrt for Lenovo ECB-PR51

on:
  workflow_dispatch:
    inputs:
      branch:
        default: 'main'
        required: true
        type: choice
        options:
          - main
          - openwrt-24.10
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt.git
  OPENWRT_BRANCH: ${{ inputs.branch || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: builder

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-setuptools python3-pip python3-yaml rsync swig \
            unzip zlib1g-dev file wget uuid-dev libgnutls28-dev libjson-c-dev \
            libzstd-dev device-tree-compiler parted dosfstools
          pip3 install pyelftools 2>/dev/null || true
          sudo apt-get clean
          df -h /

      - name: Checkout OpenWrt source
        run: |
          git clone --depth 1 -b ${{ env.OPENWRT_BRANCH }} \
            ${{ env.OPENWRT_REPO }} openwrt
          echo "Kernel version:"; ls -d openwrt/target/linux/rockchip/patches-*

      - name: Apply ECB-PR51 DTS patches
        run: |
          PATCH_DIR=$(ls -d openwrt/target/linux/rockchip/patches-* | tail -1)
          cp -v builder/patches/100-arm64-dts-rockchip-add-lenovo-ecb-pr51.patch "$PATCH_DIR/"
          cp -v builder/patches/101-arm64-dts-rockchip-add-ecb-pr51-makefile.patch "$PATCH_DIR/"

      - name: Add device to image config
        run: |
          python3 builder/scripts/add-image-config.py \
            openwrt/target/linux/rockchip/image/armv8.mk
          grep -A 8 "lenovo\|ecb-pr51" \
            openwrt/target/linux/rockchip/image/armv8.mk

      - name: Configure build
        run: |
          cd openwrt
          cat > .config << 'CONFIGEOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_lenovo_ecb-pr51=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-ipt-offload=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y
          CONFIG_PACKAGE_kmod-ata-ahci=y
          CONFIG_PACKAGE_kmod-pcie-rockchip=y
          CONFIG_PACKAGE_kmod-sdhci=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-rtl8152=y
          CONFIG_PACKAGE_kmod-usb-net-asix=y
          CONFIG_PACKAGE_kmod-usb-net-asix-ax88179=y
          CONFIG_PACKAGE_kmod-sched-cake=y
          CONFIG_PACKAGE_sqm-scripts=y
          CONFIG_PACKAGE_blockd=y
          CONFIG_PACKAGE_blkdiscard=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_u-boot-rock-3a-rk3568=y
          CONFIG_PACKAGE_trusted-firmware-a-rk3568=y
          CONFIG_PACKAGE_rkbin=y
          CONFIGEOF
          make defconfig 2>&1 | tail -5

      - name: Download sources
        run: |
          cd openwrt && make download 2>&1 | tail -5

      - name: Build tools + toolchain
        run: |
          cd openwrt
          make -j$(nproc) tools/install 2>&1 | tail -5
          make -j$(nproc) toolchain/install 2>&1 | tail -5

      - name: Build kernel & packages
        run: |
          cd openwrt
          # Build kernel first (with verbose on failure)
          make -j$(nproc) target/linux/compile 2>&1 | tee kernel-build.log | tail -20
          # Build packages  
          make -j$(nproc) package/compile 2>&1 | tee packages-build.log | tail -20

      - name: Build final images
        run: |
          cd openwrt
          # Build final images with verbose output
          make -j$(nproc) 2>&1 | tee final-build.log | tail -50
          echo "Build done"

      - name: Extract logs on failure
        if: failure()
        run: |
          cd openwrt
          echo "=== Kernel error detail ==="
          head -200 kernel-build.log 2>/dev/null || true
          echo "=== Kernel build errors ==="
          grep -i "error\|warning\|failed\|Error" kernel-build.log 2>/dev/null | head -30 || true
          find build_dir -name "*.log" -path "*/linux*" 2>/dev/null | head -5
          ls -la build_dir/target-*/linux-*/linux-*/.modules 2>/dev/null || true
          # Check dmesg from dtc compilation
          find build_dir -name "*.dtb" -path "*rockchip*" 2>/dev/null | head -10 || true
          find build_dir -name "ecb*" 2>/dev/null | head -10 || true

      - name: Package for rkdeveloptool
        if: success()
        run: |
          cd openwrt
          mkdir -p flash-pkg
          IMG=$(find bin/targets/ -name '*sysupgrade.img.gz' | head -1)
          if [ -z "$IMG" ]; then
            echo "No image found"; find bin/targets/ -type f; exit 1
          fi
          echo "Source: $IMG"
          gunzip -kf "$IMG"
          RAW="${IMG%.gz}"
          ls -lh "$RAW"

          sudo modprobe loop
          LOOP=$(sudo losetup -f --show "$RAW")
          sudo partprobe $LOOP 2>/dev/null || true
          sudo fdisk -l $LOOP > flash-pkg/partition-table.txt
          cat flash-pkg/partition-table.txt

          # Extract components
          sudo dd if=$LOOP of=flash-pkg/idbloader.img bs=512 count=16384 2>/dev/null
          sudo dd if=$LOOP of=flash-pkg/uboot.img bs=512 skip=16384 count=16384 2>/dev/null

          P1=$(sudo fdisk -l $LOOP | grep "${LOOP##*/}p1" | awk '{print $2}')
          P2=$(sudo fdisk -l $LOOP | grep "${LOOP##*/}p2" | awk '{print $2}')
          P2S=$(sudo fdisk -l $LOOP | grep "${LOOP##*/}p2" | awk '{print $4}')

          if [ -n "$P1" ] && [ -n "$P2" ]; then
            sudo dd if=$LOOP of=flash-pkg/boot.img bs=512 skip=$P1 count=$((P2 - P1)) 2>/dev/null
          fi
          if [ -n "$P2" ] && [ -n "$P2S" ]; then
            sudo dd if=$LOOP of=flash-pkg/rootfs.img bs=512 skip=$P2 count=$P2S 2>/dev/null
          fi
          cp "$RAW" flash-pkg/openwrt-ecb-pr51-raw.img
          sudo losetup -d $LOOP
          ls -lh flash-pkg/

      - name: Upload flash package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ecb-pr51
          path: openwrt/flash-pkg/
          retention-days: 30

      - name: Upload full images as backup
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ecb-pr51-full-img
          path: openwrt/bin/targets/rockchip/armv8/*.gz
          retention-days: 30
          if-no-files-found: warn
